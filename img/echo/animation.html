    <script>
        (() => {
            const SVG_NS = "http://www.w3.org/2000/svg";
            const ctrlCurvesG = document.getElementById("ctrl-curves");
            const xferCurvesG = document.getElementById("xfer-curves");
            const ctrlPktsG = document.getElementById("ctrl-packets");
            const xferPktsG = document.getElementById("xfer-packets");
            const copyArrow = document.getElementById("copy-arrow");
            const phaseLabel = document.getElementById("phase-label");

            // ── Port positions ──
            const L_PX = [65, 95, 145, 175, 225, 255, 305, 335];
            const R_PX = [545, 575, 625, 655, 705, 735, 785, 815];

            const L_SW = [
                [{ x: 50, y: 80 }, { x: 130, y: 80 }, { x: 210, y: 80 }, { x: 290, y: 80 }],
                [{ x: 50, y: 175 }, { x: 130, y: 175 }, { x: 210, y: 175 }, { x: 290, y: 175 }],
                [{ x: 50, y: 270 }, { x: 130, y: 270 }, { x: 210, y: 270 }, { x: 290, y: 270 }],
            ];
            const R_SW = [
                [{ x: 530, y: 80 }, { x: 610, y: 80 }, { x: 690, y: 80 }, { x: 770, y: 80 }],
                [{ x: 530, y: 175 }, { x: 610, y: 175 }, { x: 690, y: 175 }, { x: 770, y: 175 }],
                [{ x: 530, y: 270 }, { x: 610, y: 270 }, { x: 690, y: 270 }, { x: 770, y: 270 }],
            ];

            const Y = {
                top: 40, s1T: 80, s1B: 120, s2T: 175, s2B: 215, s3T: 270, s3B: 310, bot: 350,
            };

            const N = 8, LOG_N = 3;
            const ADDRESSES = [5, 2, 4, 3, 1, 6, 0, 7];
            const SW_W = 60, SW_H = 40;
            const COLORS = [
                "#e63946", "#f4845f", "#d4a017", "#2a9d8f", "#457b9d", "#6a4c93", "#1d3557", "#e76f51"
            ];

            function omegaShuffle(pos) {
                return ((pos << 1) | (pos >> (LOG_N - 1))) & (N - 1);
            }

            // ── Simulation (switch then shuffle) ──
            function simulate() {
                let pos = ADDRESSES.map((_, i) => i);
                const snaps = [pos.slice()];
                for (let s = 0; s < LOG_N; s++) {
                    const bit = LOG_N - 1 - s;
                    const after = pos.slice();
                    for (let sw = 0; sw < N / 2; sw++) {
                        let uP = -1, lP = -1;
                        for (let i = 0; i < N; i++) {
                            if (pos[i] === sw * 2) uP = i;
                            if (pos[i] === sw * 2 + 1) lP = i;
                        }
                        if (uP >= 0 && lP >= 0 && (ADDRESSES[uP] >> bit) & 1 && !((ADDRESSES[lP] >> bit) & 1)) {
                            after[uP] = sw * 2 + 1; after[lP] = sw * 2;
                        }
                    }
                    pos = after; snaps.push(pos.slice());
                    if (s < LOG_N - 1) {
                        const sh = new Array(N);
                        for (let i = 0; i < N; i++) sh[i] = omegaShuffle(pos[i]);
                        pos = sh; snaps.push(pos.slice());
                    }
                }
                return snaps;
            }
            // sim: [init(0), sw0(1), shuf0(2), sw1(3), shuf1(4), sw2(5)]
            const sim = simulate();

            // ── Switch states ──
            function computeStates() {
                const states = [];
                for (let s = 0; s < LOG_N; s++) {
                    const bef = sim[s * 2], aft = sim[s * 2 + 1], row = [];
                    for (let sw = 0; sw < N / 2; sw++) {
                        let uP = -1, lP = -1;
                        for (let i = 0; i < N; i++) {
                            if (bef[i] === sw * 2) uP = i;
                            if (bef[i] === sw * 2 + 1) lP = i;
                        }
                        if (uP < 0 || lP < 0) { row.push('pass'); continue; }
                        if (aft[uP] === sw * 2 + 1 && aft[lP] === sw * 2) row.push('swap');
                        else row.push('pass');
                    }
                    states.push(row);
                }
                return states;
            }
            const swStates = computeStates();

            // ── Bezier helpers ──
            function makeBez(sx, sy, ex, ey) {
                return { from: { x: sx, y: sy }, cp1: { x: sx, y: sy + (ey - sy) * 2 / 3 }, cp2: { x: ex, y: sy + (ey - sy) / 3 }, to: { x: ex, y: ey } };
            }
            function evalBez(c, t) {
                const u = 1 - t;
                return {
                    x: u * u * u * c.from.x + 3 * u * u * t * c.cp1.x + 3 * u * t * t * c.cp2.x + t * t * t * c.to.x,
                    y: u * u * u * c.from.y + 3 * u * u * t * c.cp1.y + 3 * u * t * t * c.cp2.y + t * t * t * c.to.y
                };
            }
            function bezD(c) { return `M${c.from.x},${c.from.y} C${c.cp1.x},${c.cp1.y} ${c.cp2.x},${c.cp2.y} ${c.to.x},${c.to.y}`; }

            // ── Build switch curves ──
            function getCurves(boxes, s, sw, topToBot) {
                const box = boxes[s][sw];
                const lx = box.x + SW_W / 4, rx = box.x + 3 * SW_W / 4;
                const t = box.y + 5, b = box.y + SW_H - 5;
                const [fromY, toY] = topToBot ? [t, b] : [b, t];
                if (swStates[s][sw] === 'swap')
                    return { upper: makeBez(lx, fromY, rx, toY), lower: makeBez(rx, fromY, lx, toY) };
                return { upper: makeBez(lx, fromY, lx, toY), lower: makeBez(rx, fromY, rx, toY) };
            }

            // ── Create curve SVG groups ──
            function buildCurveGroups(parentG, boxes, topToBot, beforeSnaps) {
                const groups = [], allC = [];
                for (let s = 0; s < LOG_N; s++) {
                    const g = document.createElementNS(SVG_NS, "g");
                    g.style.display = "none"; parentG.appendChild(g); groups.push(g);
                    const sc = [];
                    for (let sw = 0; sw < N / 2; sw++) {
                        const curves = getCurves(boxes, s, sw, topToBot);
                        sc.push(curves);
                        const bef = beforeSnaps[s];
                        let uP = -1, lP = -1;
                        for (let i = 0; i < N; i++) { if (bef[i] === sw * 2) uP = i; if (bef[i] === sw * 2 + 1) lP = i; }
                        for (const [pk, cv] of [[uP, curves.upper], [lP, curves.lower]]) {
                            if (pk < 0) continue;
                            const p = document.createElementNS(SVG_NS, "path");
                            p.setAttribute("d", bezD(cv)); p.setAttribute("fill", "none");
                            p.setAttribute("stroke", COLORS[pk]); p.setAttribute("stroke-width", "3.5");
                            p.setAttribute("stroke-linecap", "round"); p.setAttribute("opacity", "0.6");
                            g.appendChild(p);
                        }
                    }
                    allC.push(sc);
                }
                return { groups, curves: allC };
            }

            // Control: before switch s = sim[s*2], top-to-bottom
            const ctrlBeforeSnaps = [sim[0], sim[2], sim[4]];
            const ctrl = buildCurveGroups(ctrlCurvesG, R_SW, true, ctrlBeforeSnaps);

            // Transfer: before reverse-switch s = sim[s*2+1], bottom-to-top
            // Visual stage 0 (top) = ctrl stage 0 reversed, before = sim[1]
            // Visual stage 1 = ctrl stage 1 reversed, before = sim[3]
            // Visual stage 2 (bottom) = ctrl stage 2 reversed, before = sim[5]
            const xferBeforeSnaps = [sim[1], sim[3], sim[5]];
            const xfer = buildCurveGroups(xferCurvesG, L_SW, false, xferBeforeSnaps);

            function revealCtrlCurves(maxStage) {
                for (let s = 0; s < LOG_N; s++) ctrl.groups[s].style.display = s <= maxStage ? "" : "none";
            }
            function revealXferCurves(maxStage) {
                for (let s = 0; s < LOG_N; s++) xfer.groups[s].style.display = s <= maxStage ? "" : "none";
            }
            function hideCtrlCurves() { for (let s = 0; s < LOG_N; s++) ctrl.groups[s].style.display = "none"; }
            function hideXferCurves() { for (let s = 0; s < LOG_N; s++) xfer.groups[s].style.display = "none"; }

            // ── Get packet Bezier for a given network ──
            function getPktBez(curvesData, beforeSnap, pkt) {
                const pos = beforeSnap[pkt];
                const c = curvesData[Math.floor(pos / 2)];
                return (pos % 2 === 0) ? c.upper : c.lower;
            }

            // ── Control steps (top to bottom) ──
            const C_STEPS = [
                { type: 'sw', stg: 0, yS: Y.top, yE: Y.s1B, swT: Y.s1T, swB: Y.s1B },
                { type: 'sh', yS: Y.s1B, yE: Y.s2T },
                { type: 'sw', stg: 1, yS: Y.s2T, yE: Y.s2B, swT: Y.s2T, swB: Y.s2B },
                { type: 'sh', yS: Y.s2B, yE: Y.s3T },
                { type: 'sw', stg: 2, yS: Y.s3T, yE: Y.bot, swT: Y.s3T, swB: Y.s3B },
            ];
            const C_SN_S = [0, 1, 2, 3, 4], C_SN_E = [1, 2, 3, 4, 5];

            // ── Transfer steps (bottom to top) ──
            // Step 0: Switch 3 (ctrl stg 2 reversed)
            // Step 1: Shuffle 2 (reversed)
            // Step 2: Switch 2 (ctrl stg 1 reversed)
            // Step 3: Shuffle 1 (reversed)
            // Step 4: Switch 1 (ctrl stg 0 reversed)
            const T_STEPS = [
                { type: 'sw', stg: 2, yS: Y.bot, yE: Y.s3T, swT: Y.s3T, swB: Y.s3B },
                { type: 'sh', yS: Y.s3T, yE: Y.s2B },
                { type: 'sw', stg: 1, yS: Y.s2B, yE: Y.s2T, swT: Y.s2T, swB: Y.s2B },
                { type: 'sh', yS: Y.s2T, yE: Y.s1B },
                { type: 'sw', stg: 0, yS: Y.s1B, yE: Y.top, swT: Y.s1T, swB: Y.s1B },
            ];
            const T_SN_S = [5, 4, 3, 2, 1], T_SN_E = [4, 3, 2, 1, 0];

            // ── Position computation ──
            function getPos(portX, snapS, snapE, curvesData, beforeSnaps, step, pkt, t) {
                const s = step;
                const x0 = portX[snapS[pkt]], x1 = portX[snapE[pkt]];
                if (s.type === 'sh') return { x: x0 + (x1 - x0) * t, y: s.yS + (s.yE - s.yS) * t };

                const goingUp = s.yE < s.yS;
                const entryY = goingUp ? s.swB : s.swT;
                const exitY = goingUp ? s.swT : s.swB;
                const totY = Math.abs(s.yE - s.yS);
                const seg1 = Math.abs(entryY - s.yS);
                const seg2 = s.swB - s.swT;
                const seg3 = Math.abs(s.yE - exitY);
                const f1 = seg1 / totY, f2 = seg2 / totY;

                const bez = getPktBez(curvesData[s.stg], beforeSnaps[s.stg], pkt);

                if (f1 > 0 && t <= f1) {
                    const lt = t / f1;
                    return { x: x0 + (bez.from.x - x0) * lt, y: s.yS + (entryY - s.yS) * lt };
                } else if (t <= f1 + f2) {
                    const bt = f2 > 0 ? (t - f1) / f2 : 0;
                    return evalBez(bez, bt);
                } else {
                    const f3 = seg3 / totY;
                    const pt = f3 > 0 ? (t - f1 - f2) / f3 : 1;
                    return { x: bez.to.x + (x1 - bez.to.x) * pt, y: exitY + (s.yE - exitY) * pt };
                }
            }

            // ── Create packet elements ──
            function createPackets(parent) {
                const els = [];
                for (let i = 0; i < N; i++) {
                    const g = document.createElementNS(SVG_NS, "g"); g.style.display = "none";
                    const c = document.createElementNS(SVG_NS, "circle");
                    c.setAttribute("r", "8"); c.setAttribute("fill", COLORS[i]);
                    c.setAttribute("stroke", "#fff"); c.setAttribute("stroke-width", "1.5");
                    g.appendChild(c);
                    const lb = document.createElementNS(SVG_NS, "text");
                    lb.setAttribute("class", "packet-label"); lb.setAttribute("text-anchor", "middle");
                    lb.setAttribute("dy", "3.5"); lb.textContent = i.toString();
                    g.appendChild(lb);
                    parent.appendChild(g); els.push(g);
                }
                return els;
            }
            const cPkts = createPackets(ctrlPktsG);
            const tPkts = createPackets(xferPktsG);

            function setPkt(els, i, x, y) { els[i].style.display = ""; els[i].setAttribute("transform", `translate(${x},${y})`); }
            function hideSet(els) { for (let i = 0; i < N; i++) els[i].style.display = "none"; }

            // ── Easing ──
            function ease(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

            // ── Timing ──
            const SD = 700, SP = 300, NS = 5;
            const FLOW = NS * SD + (NS - 1) * SP;
            const P0 = 600;                    // initial pause
            const P1 = FLOW;                   // control flow
            const P2 = 500;                    // pause at ctrl output
            const P3 = 800;                    // copy states
            const P4 = 400;                    // pause before transfer
            const P5 = FLOW;                   // transfer flow
            const P6 = 800;                    // final hold
            const P7 = 500;                    // reset
            const PHASES = [P0, P1, P2, P3, P4, P5, P6, P7];
            const TOTAL = PHASES.reduce((a, b) => a + b, 0);

            const C_LABELS = ["Switch Stage 1", "Shuffle 1", "Switch Stage 2", "Shuffle 2", "Switch Stage 3"];
            const T_LABELS = ["Switch Stage 3", "Inv. Shuffle 2", "Switch Stage 2", "Inv. Shuffle 1", "Switch Stage 1"];

            function stepFromFlow(flowT) {
                const blk = SD + SP;
                const si = Math.min(Math.floor(flowT / blk), NS - 1);
                const wi = flowT - si * blk;
                const t = wi < SD ? ease(wi / SD) : 1;
                return { si, t };
            }

            let t0 = null;
            function animate(ts) {
                if (!t0) t0 = ts;
                const el = (ts - t0) % TOTAL;

                // Determine phase
                let ph = 0, acc = 0;
                for (let i = 0; i < PHASES.length; i++) { if (el < acc + PHASES[i]) { ph = i; break; } acc += PHASES[i]; }
                const pT = el - acc;

                switch (ph) {
                    case 0: // initial pause
                        hideSet(cPkts); hideSet(tPkts); hideCtrlCurves(); hideXferCurves();
                        copyArrow.style.display = "none";
                        for (let i = 0; i < N; i++) {
                            setPkt(cPkts, i, R_PX[sim[0][i]], Y.top);
                        }
                        phaseLabel.textContent = "";
                        break;

                    case 1: { // control flow
                        hideSet(tPkts); copyArrow.style.display = "none"; hideXferCurves();
                        const { si, t } = stepFromFlow(pT);
                        const st = C_STEPS[si];
                        const maxCurveStage = st.type === 'sw' ? st.stg : C_STEPS[Math.max(0, si - 1)].stg;
                        revealCtrlCurves(maxCurveStage);
                        phaseLabel.textContent = "Control: " + C_LABELS[si];
                        for (let i = 0; i < N; i++) {
                            const p = getPos(R_PX, sim[C_SN_S[si]], sim[C_SN_E[si]], ctrl.curves, ctrlBeforeSnaps, st, i, t);
                            setPkt(cPkts, i, p.x, p.y);
                        }
                        break;
                    }

                    case 2: // pause at ctrl output
                        revealCtrlCurves(LOG_N - 1); hideSet(tPkts);
                        for (let i = 0; i < N; i++) setPkt(cPkts, i, R_PX[sim[5][i]], Y.bot);
                        phaseLabel.textContent = "Addresses arrived at banks";
                        break;

                    case 3: // copy states
                        revealCtrlCurves(LOG_N - 1); revealXferCurves(LOG_N - 1);
                        copyArrow.style.display = "";
                        hideSet(tPkts);
                        for (let i = 0; i < N; i++) setPkt(cPkts, i, R_PX[sim[5][i]], Y.bot);
                        phaseLabel.textContent = "← Copy switch states to Transfer Network";
                        break;

                    case 4: // pause before transfer
                        revealCtrlCurves(LOG_N - 1); revealXferCurves(LOG_N - 1);
                        copyArrow.style.display = "";
                        hideSet(cPkts);
                        for (let i = 0; i < N; i++) setPkt(tPkts, i, L_PX[sim[5][i]], Y.bot);
                        phaseLabel.textContent = "Data enters Transfer Network from banks";
                        break;

                    case 5: { // transfer flow
                        hideSet(cPkts); copyArrow.style.display = "";
                        revealCtrlCurves(LOG_N - 1);
                        const { si, t } = stepFromFlow(pT);
                        const st = T_STEPS[si];
                        // Reveal transfer curves: stage 2 first (bottom), then 1, then 0
                        const maxXferStage = st.type === 'sw' ? st.stg : T_STEPS[Math.max(0, si - 1)].stg;
                        revealXferCurves(LOG_N - 1); // show all (they were copied)
                        phaseLabel.textContent = "Transfer: " + T_LABELS[si];
                        for (let i = 0; i < N; i++) {
                            const p = getPos(L_PX, sim[T_SN_S[si]], sim[T_SN_E[si]], xfer.curves, xferBeforeSnaps, st, i, t);
                            setPkt(tPkts, i, p.x, p.y);
                        }
                        break;
                    }

                    case 6: // final hold
                        hideSet(cPkts); revealCtrlCurves(LOG_N - 1); revealXferCurves(LOG_N - 1);
                        copyArrow.style.display = "";
                        for (let i = 0; i < N; i++) setPkt(tPkts, i, L_PX[sim[0][i]], Y.top);
                        phaseLabel.textContent = "Data delivered to read ports ✓";
                        break;

                    case 7: // reset
                        hideSet(cPkts); hideSet(tPkts); hideCtrlCurves(); hideXferCurves();
                        copyArrow.style.display = "none";
                        phaseLabel.textContent = "";
                        break;
                }
                requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        })();
    </script>

</body>
